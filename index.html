<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="style-sheet" href="./assets/style.css" />
    <title>Fashion Trivia</title>
</head>
<body>
    <header>
        <div class="timer">
            <h4>Timer: </h4>
            <span id="countdown-number"></span>
        </div>
        <div class="highScores">
            <h4>View Highscores</h4>
        </div>
    </header>
    <main class="instructions">
            <h1>Fashion Quiz Challenge!</h1>
            <p>Try to answer the questions within the allotted time. If you aren't able to finish before the game is over you lose. Press start to begin.</p>
            <button id="button">Start</button>
        <div class= questions-container> 
        <div class="question-one">
            <h2 id="question"></h2>
            <ol id="choices">
                <li id="choice1" role="button" data-answer="true"></li>
                <li id="choice2"  role="button" data-answer="false"></li>
                <li id="choice3" role="button" data-answer="false"></li>
                <li id="choice4" role="button" data-answer="false"></li>
            </ol>
            <p id=msg></p>
        </div>
     </div>
    </main>
    <section id="final-score">
        <h2>All done!</h2>
        <p>Your final score is</p>
        <label for="initials"> Enter Initials:</label>
        <input type="text" class="finished" name="records">
        <button class="submit-button">Submit</button>
    </section>

  <script src="./assets/myscript.js"></script>
</body>
</html>
